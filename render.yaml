services:
  - type: web
    name: ai-crm-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-crm-postgres
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: CLAUDE_MODEL
        value: claude-3-5-haiku-latest
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: REPORTING_INTERVAL_MINUTES
        value: "1440"
      - key: REPORTING_EMAIL_TO
        sync: false
      - key: FRONTEND_ORIGINS
        value: https://ai-crm-frontend.onrender.com
      - key: PUBLIC_API_BASE_URL
        value: https://ai-crm-backend.onrender.com

  - type: web
    name: ai-crm-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ai-crm-backend
          property: host

databases:
  - name: ai-crm-postgres
    plan: free
