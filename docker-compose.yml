services:
  postgres:
    image: postgres:16-alpine
    container_name: ai_crm_postgres
    environment:
      POSTGRES_DB: ai_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_crm"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: ai_crm_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/ai_crm}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-3-5-haiku-latest}
      AI_CACHE_TTL_SECONDS: ${AI_CACHE_TTL_SECONDS:-300}
      AI_RATE_LIMIT_PER_MINUTE: ${AI_RATE_LIMIT_PER_MINUTE:-30}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/services:/app/services
      - ./backend/alembic:/app/alembic
      - ./backend/workflows:/app/workflows

  frontend:
    build:
      context: ./frontend
    container_name: ai_crm_frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html

volumes:
  postgres_data:
