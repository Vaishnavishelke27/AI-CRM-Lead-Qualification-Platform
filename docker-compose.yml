services:
  postgres:
    image: postgres:16-alpine
    container_name: ai_crm_postgres
    environment:
      POSTGRES_DB: ai_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_crm"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: ai_crm_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/ai_crm}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-3-5-haiku-latest}
      AI_CACHE_TTL_SECONDS: ${AI_CACHE_TTL_SECONDS:-300}
      AI_RATE_LIMIT_PER_MINUTE: ${AI_RATE_LIMIT_PER_MINUTE:-30}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set to a strong random value}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      CRM_WEBHOOK_SECRET: ${CRM_WEBHOOK_SECRET:-}
      REPORTING_EMAIL_TO: ${REPORTING_EMAIL_TO:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      EMAIL_CLICK_ALLOWED_HOSTS: ${EMAIL_CLICK_ALLOWED_HOSTS:-localhost,127.0.0.1}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/services:/app/services
      - ./backend/alembic:/app/alembic
      - ./backend/workflows:/app/workflows

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: ai_crm_frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
